<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LeanTracker">
<meta name="theme-color" content="#050810">
<title>LeanTracker · The Cut</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050810; --bg2:rgba(255,255,255,0.035); --bg3:rgba(255,255,255,0.06); --bg4:rgba(255,255,255,0.10);
  --glass:rgba(13,20,38,0.55);
  --cyan:#00e5ff; --violet:#a78bfa; --fuchsia:#e879f9;
  --accent:#00e5ff;
  --accent-dim:rgba(0,229,255,0.10); --accent-dim2:rgba(0,229,255,0.04);
  --grad:linear-gradient(135deg,#00e5ff 0%,#7c6cff 55%,#e879f9 100%);
  --text:#eef2ff; --text2:#8b96b8; --text3:#465070;
  --red:#ff5470; --red-dim:rgba(255,84,112,0.12);
  --amber:#ffc857; --amber-dim:rgba(255,200,87,0.12);
  --green:#3ef2a5;
  --border:rgba(120,160,255,0.10); --border2:rgba(120,160,255,0.22);
  --fd:'Orbitron',sans-serif; --fb:'Space Grotesk',sans-serif;
  --r:14px; --r2:20px;
  --sb:env(safe-area-inset-bottom,0px); --st:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{background:var(--bg);}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:15px;
  padding-bottom:calc(86px + var(--sb));overflow-x:hidden;min-height:100vh;}

/* AMBIENT BACKGROUND */
body::before{content:'';position:fixed;inset:-6%;z-index:-2;pointer-events:none;
  background:
    radial-gradient(60% 40% at 85% -5%, rgba(124,108,255,0.16), transparent 60%),
    radial-gradient(50% 35% at 0% 15%, rgba(0,229,255,0.10), transparent 60%),
    radial-gradient(70% 50% at 50% 110%, rgba(232,121,249,0.08), transparent 60%);
  animation:aurora 26s ease-in-out infinite alternate;}
@keyframes aurora{
  0%{transform:translate3d(0,0,0) scale(1);filter:hue-rotate(0deg);}
  100%{transform:translate3d(0,-14px,0) scale(1.07);filter:hue-rotate(-22deg);}}
body::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.35;
  background-image:linear-gradient(rgba(120,160,255,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(120,160,255,0.05) 1px,transparent 1px);
  background-size:44px 44px;
  -webkit-mask-image:radial-gradient(70% 50% at 50% 0%,#000 0%,transparent 100%);
  mask-image:radial-gradient(70% 50% at 50% 0%,#000 0%,transparent 100%);}

.disp{font-family:var(--fd);font-weight:900;text-transform:uppercase;letter-spacing:.06em;}
.cond{font-family:var(--fd);font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
.grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}

/* TAB BAR */
.tabbar{position:fixed;bottom:calc(10px + var(--sb));left:12px;right:12px;z-index:100;
  background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border2);border-radius:24px;display:flex;padding:6px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);}
.tabbtn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 7px;
  gap:3px;cursor:pointer;border:none;background:none;color:var(--text3);border-radius:18px;
  font-family:var(--fb);font-size:9.5px;font-weight:600;letter-spacing:.04em;transition:all .25s;}
.tabbtn.active{color:#031018;background:var(--grad);
  box-shadow:0 0 18px rgba(0,229,255,0.45),0 0 40px rgba(124,108,255,0.25);}
.tabbtn svg{width:20px;height:20px;}

/* SCREENS */
.scr{display:none;}
.scr.active{display:block;animation:scrIn .35s cubic-bezier(.2,.8,.3,1);}
@keyframes scrIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

/* HEADER */
.hdr{padding:calc(16px + var(--st)) 18px 14px;position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,rgba(5,8,16,0.92) 70%,transparent);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.hdr-row{display:flex;justify-content:space-between;align-items:center;}
.hdr-title{font-size:23px;line-height:1.05;}
.hdr-sub{font-size:11.5px;color:var(--text2);margin-top:4px;letter-spacing:.04em;}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);
  padding:16px 17px;margin:0 14px 12px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);}
.card.glow{border-color:rgba(0,229,255,0.22);box-shadow:0 0 28px rgba(0,229,255,0.07),inset 0 1px 0 rgba(255,255,255,0.05);}

/* HERO */
.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(0,229,255,0.08),rgba(124,108,255,0.10) 60%,rgba(232,121,249,0.07));
  border:1px solid rgba(0,229,255,0.20);}
.hero::before{content:'';position:absolute;top:-40%;right:-20%;width:60%;height:120%;
  background:radial-gradient(closest-side,rgba(0,229,255,0.16),transparent);pointer-events:none;}
.hero-focus{font-size:24px;line-height:1.1;}
.hero-tag{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.12em;margin-top:5px;}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 14px 12px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 15px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.stat-lbl{font-size:9.5px;color:var(--text2);text-transform:uppercase;letter-spacing:.12em;font-family:var(--fd);font-weight:700;}
.stat-val{font-size:26px;font-family:var(--fd);font-weight:700;line-height:1.15;margin-top:5px;}
.stat-sub{font-size:11px;color:var(--text2);margin-top:3px;}

/* SECTION HDR */
.shdr{display:flex;align-items:center;justify-content:space-between;padding:16px 19px 8px;}
.shdr-t{font-size:10.5px;color:var(--text2);text-transform:uppercase;letter-spacing:.14em;font-family:var(--fd);font-weight:700;}
.shdr-t::before{content:'◢ ';color:var(--accent);font-size:8px;vertical-align:1px;}

/* BADGE */
.badge{display:inline-flex;align-items:center;background:var(--accent-dim);
  color:var(--accent);border:1px solid rgba(0,229,255,.25);border-radius:20px;
  padding:3px 11px;font-size:11px;font-weight:600;font-family:var(--fd);}

/* LIST CONTAINERS */
.hlist{margin:0 14px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);
  overflow:hidden;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.hitem{display:flex;align-items:center;gap:12px;padding:12px 15px;
  border-bottom:1px solid var(--border);transition:background .15s;}
.hitem:last-child{border-bottom:none;}
.hitem:active{background:var(--bg3);}
.hicon{width:26px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hicon svg{width:21px;height:21px;}

/* FACE SELECTOR (habit state) */
.faces{display:flex;gap:6px;flex-shrink:0;}
.face{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg3);
  color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;
  padding:4px;transition:all .2s;}
.face svg{width:100%;height:100%;}
.face.sel{animation:facePop .35s cubic-bezier(.2,.8,.3,1);}
.face.sel.f-pass{color:var(--accent);border-color:rgba(0,229,255,.5);background:var(--accent-dim);
  box-shadow:0 0 12px rgba(0,229,255,.35);}
.face.sel.f-part{color:var(--amber);border-color:rgba(255,200,87,.5);background:var(--amber-dim);
  box-shadow:0 0 12px rgba(255,200,87,.3);}
.face.sel.f-fail{color:var(--red);border-color:rgba(255,84,112,.5);background:var(--red-dim);
  box-shadow:0 0 12px rgba(255,84,112,.3);}
@keyframes facePop{0%{transform:scale(.7);}60%{transform:scale(1.18);}100%{transform:scale(1);}}

/* CHECK ROWS (meals / lifts) */
.chk{width:24px;height:24px;border-radius:8px;border:1.5px solid var(--border2);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:13px;color:#031018;
  cursor:pointer;transition:all .2s;background:var(--bg3);padding:4px;}
.chk.on{background:var(--grad);border-color:transparent;box-shadow:0 0 12px rgba(0,229,255,0.4);}
.chk svg{width:100%;height:100%;}
.chk.anim .chkpath{stroke-dasharray:16;stroke-dashoffset:16;animation:drawchk .4s ease forwards .05s;}
@keyframes drawchk{to{stroke-dashoffset:0;}}
.chk-row{display:flex;align-items:center;gap:12px;padding:10px 15px;border-bottom:1px solid var(--border);cursor:pointer;}
.chk-row:last-child{border-bottom:none;}
.chk-row.on .chk-name{color:var(--text2);text-decoration:line-through;text-decoration-color:rgba(0,229,255,.5);}
.chk-name{flex:1;font-size:13.5px;font-weight:500;}
.chk-kcal{font-size:12px;color:var(--text2);font-family:var(--fd);font-weight:500;}

/* STATUS DOTS */
.sdot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;cursor:pointer;
  transition:all .15s;border:1.5px solid transparent;flex-shrink:0;}
.s-pass{background:var(--accent-dim);color:var(--accent);border-color:rgba(0,229,255,.4);box-shadow:0 0 10px rgba(0,229,255,.25);}
.s-fail{background:var(--red-dim);color:var(--red);border-color:rgba(255,84,112,.4);}
.s-part{background:var(--amber-dim);color:var(--amber);border-color:rgba(255,200,87,.4);}
.s-none{background:var(--bg3);color:var(--text3);border-color:var(--border);}

/* CAL INPUT */
.cal-inp{background:rgba(0,0,0,0.3);border:1px solid var(--border2);border-radius:10px;
  color:var(--text);font-family:var(--fd);font-weight:700;font-size:16px;
  padding:6px 9px;width:88px;text-align:center;outline:none;transition:all .2s;}
.cal-inp:focus{border-color:var(--accent);box-shadow:0 0 12px rgba(0,229,255,.25);}
.tbar-bg{background:rgba(0,0,0,0.35);border-radius:4px;height:6px;overflow:hidden;margin:6px 0 3px;}
.tbar-fill{height:100%;border-radius:4px;transition:width .4s cubic-bezier(.2,.8,.3,1);
  box-shadow:0 0 8px rgba(0,229,255,.5);}
.tbar-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);}

/* TARGETS */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.titem{background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:12px;padding:10px 7px;text-align:center;}
.titem-val{font-family:var(--fd);font-weight:700;font-size:17px;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.titem-lbl{font-size:9.5px;color:var(--text2);margin-top:2px;letter-spacing:.04em;}

/* WEEK GRID */
.wgrid-wrap{margin:0 14px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.wgrid{border-radius:var(--r2);overflow:hidden;border:1px solid var(--border);min-width:300px;background:var(--bg2);}
.wg-row{display:grid;border-bottom:1px solid var(--border);}
.wg-row:last-child{border-bottom:none;}
.wg-cell{padding:7px 3px;text-align:center;display:flex;align-items:center;justify-content:center;}
.wg-lbl{justify-content:flex-start;padding-left:12px;font-size:11px;color:var(--text2);}
.wg-hdr{background:rgba(0,0,0,0.25);font-family:var(--fd);font-weight:700;font-size:10px;color:var(--text2);letter-spacing:.04em;}
.wg-today{color:var(--accent) !important;}

/* CAL BARS */
.cbars{display:flex;align-items:flex-end;gap:5px;height:84px;}
.cbar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.cbar-outer{width:100%;flex:1;display:flex;align-items:flex-end;}
.cbar-inner{width:100%;border-radius:4px 4px 0 0;min-height:2px;transition:height .4s;}
.cbar-d{font-size:8.5px;color:var(--text3);font-family:var(--fd);font-weight:700;}
.cbar-v{font-size:9px;color:var(--text2);}

/* WEEK NAV */
.wnav{display:flex;align-items:center;gap:10px;}
.wnav-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--accent);font-size:17px;user-select:none;transition:all .2s;}
.wnav-btn:active{box-shadow:0 0 12px rgba(0,229,255,.35);}

/* INSIGHTS */
.ins-card{margin:0 14px 10px;border-radius:var(--r2);padding:13px 15px;
  border:1px solid var(--border);background:var(--bg2);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.ins-card.g{border-color:rgba(0,229,255,.25);background:var(--accent-dim2);}
.ins-card.r{border-color:rgba(255,84,112,.2);background:rgba(255,84,112,.04);}
.ins-card.a{border-color:rgba(255,200,87,.25);background:rgba(255,200,87,.04);}
.ins-t{font-size:13px;font-weight:600;margin-bottom:3px;}
.ins-b{font-size:12px;color:var(--text2);line-height:1.55;}

/* RULES */
.rule{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.rule:last-child{border-bottom:none;}
.rule-n{font-family:var(--fd);font-weight:900;font-size:18px;line-height:1.2;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;flex-shrink:0;}
.rule-t{font-size:12.5px;color:var(--text2);line-height:1.55;}

/* BUTTONS */
.btn-acc{display:block;width:calc(100% - 28px);margin:0 14px 10px;
  background:var(--grad);color:#031018;border:none;border-radius:var(--r2);
  padding:13px 18px;font-family:var(--fd);font-size:13px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;cursor:pointer;
  box-shadow:0 0 20px rgba(0,229,255,.3);}
.btn-acc:active{opacity:.85;}
.btn-ghost{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);
  color:var(--text);font-family:var(--fb);font-size:13px;padding:11px 14px;
  cursor:pointer;width:100%;text-align:left;margin-bottom:8px;display:block;transition:all .2s;}
.btn-ghost:active{border-color:rgba(0,229,255,.4);}
.btn-ghost .arr{color:var(--accent);float:right;}

/* AI BOX */
.ai-box{margin:0 14px 12px;background:var(--bg2);border:1px solid rgba(0,229,255,.2);
  border-radius:var(--r2);padding:15px;font-size:13px;line-height:1.7;
  color:var(--text2);display:none;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.ai-box.on{display:block;animation:scrIn .3s;}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(2,4,10,.85);backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:#0a1020;border:1px solid var(--border2);border-bottom:none;border-radius:24px 24px 0 0;
  padding:18px 18px calc(20px + var(--sb));width:100%;max-height:80vh;overflow-y:auto;}
.modal-h{width:38px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 18px;}
.modal-t{font-family:var(--fd);font-size:18px;font-weight:700;text-transform:uppercase;margin-bottom:14px;letter-spacing:.06em;}
.inp{background:rgba(0,0,0,0.3);border:1px solid var(--border2);border-radius:12px;color:var(--text);
  font-family:var(--fb);font-size:16px;padding:11px 14px;width:100%;margin-bottom:9px;outline:none;transition:all .2s;}
.inp:focus{border-color:var(--accent);box-shadow:0 0 14px rgba(0,229,255,.2);}
.mbtn{background:var(--grad);color:#031018;border:none;border-radius:12px;padding:13px;
  width:100%;font-family:var(--fd);font-size:13px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;cursor:pointer;margin-top:4px;box-shadow:0 0 16px rgba(0,229,255,.25);}

/* WEIGHT CHART */
.wchart{position:relative;height:130px;margin:7px 0;}
.wchart svg{width:100%;height:100%;}

/* WEIGH-IN TABLE */
.wtable{width:100%;border-collapse:collapse;font-size:12px;}
.wtable th{font-family:var(--fd);font-weight:700;font-size:9.5px;color:var(--text2);
  text-transform:uppercase;letter-spacing:.08em;text-align:left;padding:6px 4px;border-bottom:1px solid var(--border2);}
.wtable td{padding:7px 4px;border-bottom:1px solid var(--border);color:var(--text2);}
.wtable tr:last-child td{border-bottom:none;}
.wtable .num{font-family:var(--fd);font-weight:500;}

/* LANG BTN */
.lang-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;
  color:var(--accent);font-size:11px;font-family:var(--fd);font-weight:700;
  padding:5px 12px;cursor:pointer;}

/* EXPORT */
.export-row{display:flex;gap:8px;margin:0 14px 12px;}
.exp-btn{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);
  color:var(--text2);font-family:var(--fd);font-weight:700;font-size:11px;
  padding:11px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;}

/* LOADER */
.loader{display:inline-block;width:14px;height:14px;border:2px solid var(--accent-dim);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ILLUSTRATIONS */
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.ringwrap{position:relative;width:88px;height:88px;flex-shrink:0;}
.ringwrap > svg{width:100%;height:100%;filter:drop-shadow(0 0 9px rgba(0,229,255,.35));}
.ring-ic{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.ring-ic svg{width:38px;height:38px;animation:floaty 4s ease-in-out infinite;
  filter:drop-shadow(0 0 6px rgba(0,229,255,.45));}
.hero-kcal{margin-top:10px;font-family:var(--fd);font-weight:700;font-size:12px;color:var(--accent);letter-spacing:.06em;}
.illus-side{flex-shrink:0;}
.illus-side svg{width:64px;height:64px;animation:floaty 4.5s ease-in-out infinite;
  filter:drop-shadow(0 0 10px rgba(124,108,255,.4));}
.illus-mini{float:right;margin:-2px 0 6px 10px;opacity:.9;}
.illus-mini svg{width:42px;height:42px;filter:drop-shadow(0 0 8px rgba(0,229,255,.3));}
.chart-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:7px;color:var(--text2);font-size:11.5px;
  background:radial-gradient(closest-side,rgba(5,8,16,.75),transparent);}
.chart-empty svg{width:42px;height:42px;opacity:.9;}

/* MEAL CONTEXT CHIPS */
.chip{display:inline-block;margin-left:7px;padding:1.5px 8px;border-radius:10px;border:1px solid var(--border);
  font-size:9px;color:var(--text2);vertical-align:1.5px;background:rgba(0,0,0,.28);white-space:nowrap;letter-spacing:.03em;}
.chip.c-office{border-color:rgba(0,229,255,.25);color:var(--cyan);}
.chip.c-home{border-color:rgba(62,242,165,.25);color:var(--green);}
.chip.c-flex{border-color:rgba(167,139,250,.3);color:var(--violet);}
.chip.c-indulgent{border-color:rgba(232,121,249,.3);color:var(--fuchsia);}

/* BOOT SEQUENCE */
#boot{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;}
#boot.done{animation:bootOut .45s ease forwards;}
@keyframes bootOut{to{opacity:0;visibility:hidden;}}
.boot-sub{font-family:var(--fd);font-size:9px;letter-spacing:.3em;color:var(--text2);}
.boot-bar{width:180px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.boot-fill{height:100%;width:0;background:var(--grad);animation:bootFill .85s ease forwards;
  box-shadow:0 0 10px var(--accent);}
@keyframes bootFill{to{width:100%}}

/* HUD TICKER */
.ticker{padding:2px 19px 0;font-family:var(--fd);font-weight:500;font-size:9.5px;letter-spacing:.16em;
  color:var(--text2);min-height:15px;white-space:nowrap;overflow:hidden;}
.ticker::after{content:'▍';color:var(--accent);animation:blink 1.1s steps(1) infinite;margin-left:2px;}
@keyframes blink{50%{opacity:0;}}

/* STREAK CHIP */
.streak-chip{font-family:var(--fd);font-weight:700;font-size:11px;color:var(--amber);
  background:var(--amber-dim);border:1px solid rgba(255,200,87,.3);border-radius:20px;padding:5px 11px;}

/* MISSION SEGMENT BAR */
.seg-wrap{display:flex;gap:2.5px;margin-top:13px;position:relative;z-index:1;}
.seg{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.08);}
.seg.on{background:rgba(0,229,255,.75);}
.seg.now{background:#fff;box-shadow:0 0 9px var(--accent);animation:segPulse 1.3s ease-in-out infinite;}
@keyframes segPulse{50%{opacity:.4;}}
.seg-lbls{display:flex;justify-content:space-between;font-size:9px;color:var(--text2);
  font-family:var(--fd);font-weight:700;letter-spacing:.1em;margin-top:6px;position:relative;z-index:1;}

/* SPARK PARTICLES + TOAST */
.spark{position:fixed;width:5px;height:5px;border-radius:50%;pointer-events:none;z-index:300;}
.toast{position:fixed;top:calc(14px + var(--st));left:50%;transform:translate(-50%,-220%);z-index:400;
  background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(0,229,255,.35);color:var(--accent);font-family:var(--fd);font-weight:700;
  font-size:11px;letter-spacing:.14em;padding:11px 19px;border-radius:14px;white-space:nowrap;
  transition:transform .4s cubic-bezier(.2,.8,.3,1);box-shadow:0 0 26px rgba(0,229,255,.25);}
.toast.show{transform:translate(-50%,0);}

/* ACCESSIBILITY */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;
    transition-duration:.01ms !important;}
}

/* RUN ROWS */
.run-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.run-row:last-child{border-bottom:none;}
.run-day{font-family:var(--fd);font-weight:700;font-size:11px;color:var(--accent);width:36px;flex-shrink:0;}
.run-km{font-family:var(--fd);font-weight:700;font-size:15px;}
</style>
</head>

// DATE UTILITIES
// All keys use LOCAL dates (the old toISOString() approach shifted
// entries a day backwards for timezones ahead of UTC).
// Weeks are Sunday-anchored to match the program sheet (Jun 7 = Sun).
// ─────────────────────────────────────────────────────────────────
const W1_START = new Date(PROGRAM.startY, PROGRAM.startM, PROGRAM.startD); // local midnight

function dkey(d) {
  const x = new Date(d);
  return x.getFullYear() + '-' + String(x.getMonth()+1).padStart(2,'0') + '-' + String(x.getDate()).padStart(2,'0');
}
function getWeekStart(d) {           // Sunday of the week containing d
  const x = new Date(d);
  x.setHours(0,0,0,0);
  x.setDate(x.getDate() - x.getDay());
  return x;
}
function dateToWn(d) {
  const ws = getWeekStart(d);
  // round (not floor): a DST shift makes the diff ±1h off an exact week
  return Math.max(1, Math.round((ws - W1_START) / 604800000) + 1);
}
function wnToStart(wn) {
  const d = new Date(W1_START);
  d.setDate(d.getDate() + (wn - 1) * 7);
  return d;
}
function todayKey() { return dkey(new Date()); }
function todayWn()  { return dateToWn(new Date()); }
function todayDow() { return new Date().getDay(); }

function fmtDate(d) {
  return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function wnRange(wn) {
  const start = wnToStart(wn);
  const end = new Date(start); end.setDate(end.getDate() + 6);
  return fmtDate(start) + ' – ' + fmtDate(end);
}
function getWeekKeys(wn) {
  const start = wnToStart(wn);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(start); d.setDate(d.getDate() + i); return dkey(d);
  });
}

// ─────────────────────────────────────────────────────────────────
// STATUS HELPERS
// ─────────────────────────────────────────────────────────────────
function sIcon(v) { return v===1?'✓':v===0?'✗':v===0.5?'~':'—'; }
function sCls(v)  { return v===1?'s-pass':v===0?'s-fail':v===0.5?'s-part':'s-none'; }

function dayTarget(dow) { return DAYPLAN[dow].cal; }

// ─────────────────────────────────────────────────────────────────
// MISSION HUD — streak, countdown, micro-reward feedback
// ─────────────────────────────────────────────────────────────────
const PROG_END = new Date(PROGRAM.endY, PROGRAM.endM, PROGRAM.endD);
const PROG_DAYS = Math.round((PROG_END - W1_START) / 86400000) + 1;  // 27

function daysLeft() {
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.max(0, Math.round((PROG_END - now) / 86400000));
}
function programDayIdx() {
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.min(Math.max(Math.round((now - W1_START) / 86400000), 0), PROG_DAYS - 1);
}

// A day keeps the streak alive if ANYTHING was logged — the streak
// rewards showing up, not perfection.
function isActiveDay(dk) {
  const d = DB[dk];
  if (!d) return false;
  if (d.cal || d.training || d.weight || d.waist || d.runDone) return true;
  if (d.habits && Object.values(d.habits).some(v => v !== null && v !== undefined)) return true;
  if (d.meals && Object.keys(d.meals).length) return true;
  if (d.lifts && Object.keys(d.lifts).length) return true;
  return false;
}
function calcStreak() {
  let n = 0;
  const d = new Date();
  if (!isActiveDay(dkey(d))) d.setDate(d.getDate() - 1);  // an unlogged today doesn't break it yet
  while (isActiveDay(dkey(d))) { n++; d.setDate(d.getDate() - 1); }
  return n;
}

const SPARK_COLORS = ['#00e5ff','#7c6cff','#e879f9','#3ef2a5'];
function burst(el, n) {
  if (!el) return;
  try { if (navigator.vibrate) navigator.vibrate(10); } catch (e) {}
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
  for (let i = 0; i < (n || 9); i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    s.style.left = cx + 'px'; s.style.top = cy + 'px';
    s.style.background = SPARK_COLORS[i % SPARK_COLORS.length];
    s.style.boxShadow = '0 0 6px ' + SPARK_COLORS[i % SPARK_COLORS.length];
    document.body.appendChild(s);
    const a = Math.random() * Math.PI * 2, d = 20 + Math.random() * 26;
    s.animate(
      [{transform:'translate(-50%,-50%) scale(1)', opacity:1},
       {transform:'translate(calc(-50% + ' + (Math.cos(a)*d).toFixed(0) + 'px), calc(-50% + ' + (Math.sin(a)*d).toFixed(0) + 'px)) scale(0)', opacity:0}],
      {duration: 420 + Math.random() * 230, easing: 'cubic-bezier(.2,.8,.3,1)'}
    ).onfinish = () => s.remove();
  }
}

let _toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  try { if (navigator.vibrate) navigator.vibrate([12, 40, 12]); } catch (e) {}
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function countUp(el, target, suffix) {
  const dur = 550, t0 = performance.now();
  function step(ts) {
    const p = Math.min((ts - t0) / dur, 1);
    el.textContent = Math.round(target * (1 - Math.pow(1 - p, 3))) + (suffix || '');
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── Triple activity rings: kcal (outer) / habits (mid) / training (inner)
function _ringArc(id, r, stroke) {
  const C = (2 * Math.PI * r).toFixed(1);
  return '<circle id="' + id + '" cx="46" cy="46" r="' + r + '" fill="none" stroke="' + stroke + '" ' +
    'stroke-width="4.5" stroke-linecap="round" stroke-dasharray="' + C + '" stroke-dashoffset="' + C + '" ' +
    'transform="rotate(-90 46 46)" style="transition:stroke-dashoffset .5s cubic-bezier(.2,.8,.3,1);"/>';
}
function ringStats(dk) {
  const day = getDay(dk);
  const plan = DAYPLAN[todayDow()];
  const hk = HKEYS.filter(k => k !== 'cal');
  const hp = hk.filter(k => day.habits[k] === 1).length;
  let train = 0, trainLbl = '—';
  if (plan.workout) {
    const done = plan.workout.reduce((s, _, i) => s + (day.lifts[i] ? 1 : 0), 0);
    train = done / plan.workout.length;
    trainLbl = done + '/' + plan.workout.length;
  } else {
    train = (day.runDone || day.training) ? 1 : 0;
    trainLbl = train ? '✓' : '—';
  }
  return {cal: day.cal || 0, target: plan.cal, kcal: Math.min((day.cal || 0) / plan.cal, 1),
          habits: hp / hk.length, hp, hkLen: hk.length, train: Math.min(train, 1), trainLbl};
}
function updateRings() {
  const s = ringStats(todayKey());
  [['hero-arc', 41, s.kcal], ['hero-arc-h', 34.5, s.habits], ['hero-arc-t', 28, s.train]].forEach(([id, r, p]) => {
    const el = document.getElementById(id);
    if (el) el.style.strokeDashoffset = ((2 * Math.PI * r) * (1 - p)).toFixed(1);
  });
  const hk = document.getElementById('hero-kcal');
  if (hk) hk.innerHTML =
    '<span style="color:var(--accent);">' + micon('cal', 11) + ' ' + s.cal + '/' + s.target + '</span>' +
    '<span style="color:var(--text3);"> · </span><span style="color:var(--green);">✓ ' + s.hp + '/' + s.hkLen + '</span>' +
    '<span style="color:var(--text3);"> · </span><span style="color:#a78bfa;">' + micon('training', 11) + ' ' + s.trainLbl + '</span>';
}

let _tickerLast = '';
function setTicker() {
  const el = document.getElementById('ticker');
  if (!el) return;
  const wn = Math.min(todayWn(), PROGRAM.weeks);
  const plan = DAYPLAN[todayDow()];
  const txt = '» W' + wn + '/' + PROGRAM.weeks + ' ─ ' + plan.focus[lang].toUpperCase() +
    ' ─ ' + plan.cal + ' KCAL ─ ' + t('streak_w') + ' ' + calcStreak() + 'D ─ T−' + daysLeft() + ' ' + t('dest');
  if (_tickerLast === txt) { el.textContent = txt; return; }   // typewriter only when the line changes
  _tickerLast = txt;
  el.textContent = '';
  let i = 0;
  const iv = setInterval(() => {
    el.textContent = txt.slice(0, ++i);
    if (i >= txt.length) clearInterval(iv);
  }, 16);
}
function runKmFor(wn, dow) {
  const plan = PROGRAM.runs[wn - 1];
  return plan ? (plan[dow] || 0) : 0;
}

    '<div class="titem"><div class="titem-val">' + PROGRAM.weekBudget.toLocaleString() + '</div><div class="titem-lbl">' + t('t_budget') + '</div></div>' +
    '<div class="titem"><div class="titem-val">' + settings.goalWeight + 'kg</div><div class="titem-lbl">' + t('t_goal') + '</div></div>' +

  const dk  = todayKey();

function renderMeals(dk, plan, tCal) {
  const day = getDay(dk);
  const list = document.getElementById('meal-list');
  list.innerHTML = plan.meals.map((m, i) => {
    const name = m.c === 'indulgent' ? t('indulgent') : m.n;
    const cc = CTXCHIP[m.c];
    const chip = cc ? '<span class="chip c-' + m.c + '">' + cicon(m.c, 10) + ' ' + cc[lang] + '</span>' : '';
    const on = !!day.meals[i];
    return '<div class="chk-row' + (on ? ' on' : '') + '" onclick="toggleMeal(\'' + dk + '\',' + i + ',this)">' +
      '<div class="chk' + (on ? ' on' : '') + '">' + (on ? CHK_SVG : '') + '</div>' +
      '<div class="chk-name">' + name + chip + '</div>' +
      '<div class="chk-kcal">' + (m.k != null ? m.k : '?') + '</div></div>';
  }).join('');
  const checked = plan.meals.reduce((s, m, i) => s + (day.meals[i] && m.k ? m.k : 0), 0);
  document.getElementById('meal-badge').textContent = checked + ' / ' + tCal;
}

function toggleMeal(dk, i, el) {
  const day = getDay(dk);
  const turningOn = !day.meals[i];
  if (turningOn) day.meals[i] = 1; else delete day.meals[i];
  // keep logged kcal in sync with the checklist; manual edits still override
  const plan = DAYPLAN[todayDow()];
  const sum = plan.meals.reduce((s, m, j) => s + (day.meals[j] && m.k ? m.k : 0), 0);
  day.cal = sum || null;
  persist();
  if (turningOn && el) burst(el.querySelector('.chk') || el);
  renderToday();
  if (turningOn) {
    const chk = document.querySelectorAll('#meal-list .chk')[i];
    if (chk) chk.classList.add('anim');
    if (plan.meals.every((m, j) => day.meals[j])) toast(t('meals_done'));
  }
}

function renderHabits(dk, day, tCal) {
  const hnames = L[lang].hnames;
  const list = document.getElementById('hlist');
  list.innerHTML = '';

  HKEYS.forEach((key, i) => {
    const item = document.createElement('div');
    item.className = 'hitem';

    if (key === 'cal') {
      const cv  = day.cal ?? '';
      const pct = cv ? Math.min((cv / tCal) * 100, 130) : 0;
      const bc  = cv > tCal * 1.05 ? 'var(--red)' : (cv && cv < tCal * 0.75) ? 'var(--amber)' : 'var(--grad)';
      item.innerHTML =
        '<span class="hicon">' + micon(key) + '</span>' +
        '<div style="flex:1;">' +
          '<div style="font-size:14px;font-weight:500;">' + hnames[i] + '</div>' +
          '<div class="tbar-bg"><div class="tbar-fill" id="cal-bar" style="width:' + pct + '%;background:' + bc + ';"></div></div>' +
          '<div class="tbar-lbl"><span>0</span><span>↑ ' + tCal + '</span></div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:5px;">' +
          '<input class="cal-inp" id="cal-inp" type="number" value="' + cv + '" placeholder="—" oninput="onCalInput(this.value,' + tCal + ')">' +
          '<span style="font-size:10px;color:var(--text2);">kcal</span>' +
        '</div>';
    } else {
      const val = day.habits[key] ?? null;
      const fcls = {1:'f-pass', 0.5:'f-part', 0:'f-fail'};
      const faces = [1, 0.5, 0].map(kind =>
        '<button class="face ' + fcls[kind] + (val === kind ? ' sel' : '') + '" ' +
        'onclick="setHabit(this,' + kind + ')">' + faceSvg(kind) + '</button>'
      ).join('');
      item.innerHTML =
        '<span class="hicon">' + micon(key) + '</span>' +
        '<div style="flex:1;font-size:14px;font-weight:500;">' + hnames[i] + '</div>' +
        '<div class="faces" data-dk="' + dk + '" data-key="' + key + '">' + faces + '</div>';
    }
    list.appendChild(item);
  });
}

function renderWorkout(dk, plan) {
  const wrap = document.getElementById('workout-section');
  if (!plan.workout) { wrap.innerHTML = ''; return; }
  const day = getDay(dk);
  const done = plan.workout.reduce((s,_,i) => s + (day.lifts[i] ? 1 : 0), 0);
  let html = '<div class="shdr"><span class="shdr-t">' + t('workout') + '</span>' +
    '<span class="badge">' + done + ' / ' + plan.workout.length + ' ' + t('lifts') + '</span></div>' +
    '<div class="hlist">';
  html += plan.workout.map((ex, i) => {
    const on = !!day.lifts[i];
    return '<div class="chk-row' + (on ? ' on' : '') + '" onclick="toggleLift(\'' + dk + '\',' + i + ',this)">' +
      '<div class="chk' + (on ? ' on' : '') + '">' + (on ? CHK_SVG : '') + '</div>' +
      '<div class="chk-name">' + ex[0] + '</div>' +
      '<div class="chk-kcal">' + ex[1] + '</div></div>';
  }).join('');
  html += '</div>';
  wrap.innerHTML = html;
}

function toggleLift(dk, i, el) {
  const day = getDay(dk);
  const turningOn = !day.lifts[i];
  if (turningOn) day.lifts[i] = 1; else delete day.lifts[i];
  persist();
  const plan = DAYPLAN[todayDow()];
  if (turningOn && el) burst(el.querySelector('.chk') || el);
  renderWorkout(dk, plan);
  updateRings();
  if (turningOn) {
    const chk = document.querySelectorAll('#workout-section .chk')[i];
    if (chk) chk.classList.add('anim');
    if (plan.workout && plan.workout.every((_, j) => day.lifts[j])) toast(t('workout_done'));
  }
}

function setHabit(btn, kind) {
  const wrap = btn.parentElement;
  const dk  = wrap.getAttribute('data-dk');
  const key = wrap.getAttribute('data-key');
  const day = getDay(dk);
  const val = day.habits[key] === kind ? null : kind;   // tap the same face again to clear
  day.habits[key] = val;
  persist();
  wrap.querySelectorAll('.face').forEach(f => f.classList.remove('sel'));
  if (val !== null) {
    void btn.offsetWidth;   // restart the pop animation
    btn.classList.add('sel');
    try { if (navigator.vibrate) navigator.vibrate(8); } catch (e) {}
    if (val === 1) {
      burst(btn);
      if (HKEYS.filter(k => k !== 'cal').every(k => day.habits[k] === 1)) toast(t('habits_done'));
    }
  }
  refreshScore(dk);
  updateRings();
  updateStreak();
}

function updateStreak() {
  const el = document.getElementById('streak-chip');
  if (el) el.innerHTML = micon('bolt', 12) + ' ' + calcStreak();
}

function refreshScore(dk) {
  const day = getDay(dk);
  let pass = 0, tot = 0;
  HKEYS.filter(k => k !== 'cal').forEach(k => {
    const v = day.habits[k];
    if (v !== null && v !== undefined) { tot++; if (v === 1) pass++; }
  });
  document.getElementById('score-badge').textContent = tot > 0 ? pass + '/' + tot : '—';
}

function onCalInput(val, tCal) {
  const dk  = todayKey();
  const day = getDay(dk);
  const n   = val ? parseInt(val) : null;
  day.cal   = n;
  persist();
  const pct = n ? Math.min((n / tCal) * 100, 130) : 0;
  const bc  = n > tCal * 1.05 ? 'var(--red)' : (n && n < tCal * 0.75) ? 'var(--amber)' : 'var(--grad)';
  const bar = document.getElementById('cal-bar');
  if (bar) { bar.style.width = pct + '%'; bar.style.background = bc; }
  updateRings();
}

function saveTodayField(field, val) {
  const day = getDay(todayKey());
  day[field] = val;
  persist();
}

// ─────────────────────────────────────────────────────────────────
// WEEK SCREEN
// ─────────────────────────────────────────────────────────────────
let viewWn = todayWn();

function changeWeek(dir) {
  viewWn = Math.max(1, viewWn + dir);
  renderWeek();
}

function renderWeek() {
  const wn   = viewWn;
  const dks  = getWeekKeys(wn);
  const ds   = L[lang].dshort;
  const hn   = L[lang].hnames;
  const tk   = todayKey();

  document.getElementById('wk-label').textContent = 'W' + wn;
  document.getElementById('wk-date').textContent  = wnRange(wn);

  // Compliance
  let pass = 0, tot = 0;
  dks.forEach(dk => {
    const day = DB[dk];
    if (!day) return;
    HKEYS.filter(k => k !== 'cal').forEach(k => {
      const v = day.habits?.[k];
      if (v !== null && v !== undefined) { tot++; if (v === 1) pass++; }
    });
  });
  if (tot > 0) countUp(document.getElementById('wk-pct'), Math.round((pass / tot) * 100), '%');
  else document.getElementById('wk-pct').textContent = '—';

  const cvals = dks.map(dk => DB[dk]?.cal).filter(Boolean);
  if (cvals.length) countUp(document.getElementById('wk-avgcal'), Math.round(cvals.reduce((a,b)=>a+b,0)/cvals.length));
  else document.getElementById('wk-avgcal').textContent = '—';
  document.getElementById('wk-calsub').textContent = t('target') + ' ' + settings.calMin + '–' + settings.calMax;

  // Weekly calorie budget (from program: 15,410 kcal incl. weekend caps)
  const consumed = cvals.reduce((a,b)=>a+b,0);
  const pctB = Math.min((consumed / PROGRAM.weekBudget) * 100, 100);
  const bar = document.getElementById('budget-bar');
  bar.style.width = pctB + '%';
  bar.style.background = consumed > PROGRAM.weekBudget ? 'var(--red)' : 'var(--grad)';
  document.getElementById('budget-badge').textContent = Math.round(pctB) + '%';
  document.getElementById('budget-used').textContent = consumed.toLocaleString() + ' ' + t('used');
  document.getElementById('budget-left').textContent = Math.max(0, PROGRAM.weekBudget - consumed).toLocaleString() + ' ' + t('left');

  // Habit grid (Sun → Sat)
  const cols = '78px repeat(7,1fr)';
  let html = '<div class="wg-row" style="grid-template-columns:' + cols + ';">' +
    '<div class="wg-cell wg-hdr wg-lbl"></div>';
  ds.forEach((d, i) => {
    const isToday = dks[i] === tk;
    html += '<div class="wg-cell wg-hdr' + (isToday ? ' wg-today' : '') + '">' + d + '</div>';
  });
  html += '</div>';

  HKEYS.forEach((key, hi) => {
    html += '<div class="wg-row" style="grid-template-columns:' + cols + ';">' +
      '<div class="wg-cell wg-lbl">' + hn[hi] + '</div>';
    dks.forEach(dk => {
      const v = DB[dk]?.habits?.[key] ?? null;
      html += '<div class="wg-cell"><div class="sdot ' + sCls(v) + '" style="width:22px;height:22px;font-size:10px;">' + sIcon(v) + '</div></div>';
    });
    html += '</div>';
  });
  document.getElementById('wgrid').innerHTML = html;

  // Calorie bars — per-day targets from the program
  const maxH = 64;
  document.getElementById('cbars').innerHTML = dks.map((dk, i) => {
    const cal  = DB[dk]?.cal;
    const tCal = dayTarget(i);
    const h    = cal ? Math.min(Math.round((cal / (tCal * 1.35)) * maxH), maxH) : 2;
    const col  = !cal ? 'var(--bg4)' : cal > tCal * 1.05 ? 'var(--red)' : cal < tCal * 0.75 ? 'var(--amber)' : 'var(--accent)';
    return '<div class="cbar-col">' +
      '<div class="cbar-outer"><div class="cbar-inner" style="height:' + h + 'px;background:' + col + ';"></div></div>' +
      '<div class="cbar-d">' + ds[i] + '</div>' +
      '<div class="cbar-v">' + (cal || '—') + '</div></div>';
  }).join('');

  // Habit radar — weekly average per habit (pass=1, partial=0.5, fail=0)
  renderRadar(dks);

  // Running plan for this program week — tap a run to log it; km fill the bar
  const runPlan = PROGRAM.runs[wn - 1];
  const runCard = document.getElementById('run-card');
  if (runPlan) {
    let totalKm = 0, doneKm = 0;
    const rows = dks.map((dk, dow) => {
      const km = runPlan[dow];
      if (!km) return '';
      totalKm += km;
      const done = !!DB[dk]?.runDone;
      if (done) doneKm += km;
      const tr = DB[dk]?.training;
      return '<div class="run-row" style="cursor:pointer;" onclick="toggleRun(\'' + dk + '\',this)">' +
        '<div class="chk' + (done ? ' on' : '') + '">' + (done ? CHK_SVG : '') + '</div>' +
        '<span class="run-day">' + ds[dow] + '</span>' +
        '<span class="run-km grad-text">' + km + ' km</span>' +
        '<span style="flex:1;text-align:right;font-size:12px;color:var(--text2);">' + (tr || '') + '</span></div>';
    }).join('');
    const pctR = totalKm ? Math.min((doneKm / totalKm) * 100, 100) : 0;
    runCard.innerHTML = '<span class="illus-mini">' + illus('run') + '</span>' + rows +
      '<div class="tbar-bg" style="height:7px;margin-top:11px;"><div class="tbar-fill" style="width:' + pctR + '%;background:var(--grad);"></div></div>' +
      '<div class="tbar-lbl"><span>' + doneKm + ' km</span><span>' + totalKm + ' km</span></div>';
    document.getElementById('run-total').textContent = doneKm + ' / ' + totalKm + ' km';
  } else {
    runCard.innerHTML = '<span style="color:var(--text3);font-size:13px;">' + t('no_run') + '</span>';
    document.getElementById('run-total').textContent = '—';
  }

  // Training log
  const tlog = dks.map((dk, i) => {
    const tr = DB[dk]?.training;
    if (!tr || tr === '—' || tr === '') return '';
    return '<div style="display:flex;gap:9px;padding:3px 0;border-bottom:1px solid var(--border);">' +
      '<span style="color:var(--accent);font-family:var(--fd);font-weight:700;width:30px;flex-shrink:0;font-size:11px;">' + ds[i] + '</span>' +
      '<span style="color:var(--text2);font-size:13px;">' + tr + '</span></div>';
  }).join('');
  document.getElementById('tlog-card').innerHTML = tlog || '<span style="color:var(--text3);font-size:13px;">' + t('no_data') + '</span>';
}

function toggleRun(dk, el) {
  const day = getDay(dk);
  const turningOn = !day.runDone;
  day.runDone = turningOn ? 1 : 0;
  persist();
  if (turningOn && el) burst(el.querySelector('.chk') || el);
  renderWeek();
  if (dk === todayKey()) updateRings();
  if (turningOn) {
    const chk = document.querySelector('#run-card .run-row[onclick*="' + dk + '"] .chk');
    if (chk) chk.classList.add('anim');
    const plan = PROGRAM.runs[viewWn - 1];
    if (plan && getWeekKeys(viewWn).every((k, dow) => !plan[dow] || DB[k]?.runDone)) toast(t('runs_done'));
  }
}

// 7-axis spider chart: one axis per habit (calories has its own bar chart)
function renderRadar(dks) {
  const el = document.getElementById('radar');
  if (!el) return;
  const hk = HKEYS.filter(k => k !== 'cal');
  const hn = L[lang].hnames.filter((_, i) => HKEYS[i] !== 'cal');
  const vals = hk.map(k => {
    let s = 0, c = 0;
    dks.forEach(dk => {
      const v = DB[dk]?.habits?.[k];
      if (v !== null && v !== undefined) { s += v; c++; }
    });
    return c ? s / c : 0;
  });
  const W = 280, H = 232, cx = 140, cy = 119, R = 78, n = hk.length;
  const pt = (i, r) => {
    const a = i * 2 * Math.PI / n - Math.PI / 2;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  };
  const poly = r => hk.map((_, i) => pt(i, r).map(x => x.toFixed(1)).join(',')).join(' ');
  const dataPoly = vals.map((v, i) => pt(i, Math.max(v, 0.04) * R).map(x => x.toFixed(1)).join(',')).join(' ');
  let axes = '', labels = '';
  hk.forEach((k, i) => {
    const [x, y] = pt(i, R);
    axes += '<line x1="' + cx + '" y1="' + cy + '" x2="' + x.toFixed(1) + '" y2="' + y.toFixed(1) + '" stroke="rgba(120,160,255,0.12)"/>';
    const [lx, ly] = pt(i, R + 17);
    labels += '<text x="' + lx.toFixed(1) + '" y="' + (ly + 3).toFixed(1) + '" fill="#8b96b8" font-size="8" ' +
      'text-anchor="middle" font-family="Orbitron, sans-serif" letter-spacing="1">' +
      hn[i].toUpperCase().slice(0, 8) + '</text>';
  });
  const dots = vals.map((v, i) => {
    const [x, y] = pt(i, Math.max(v, 0.04) * R);
    return '<circle cx="' + x.toFixed(1) + '" cy="' + y.toFixed(1) + '" r="3" fill="#00e5ff" ' +
      'style="filter:drop-shadow(0 0 4px rgba(0,229,255,.8));"/>';
  }).join('');
  el.innerHTML =
    '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">' +
    '<defs><linearGradient id="rdg" x1="0" y1="0" x2="1" y2="1">' +
    '<stop offset="0" stop-color="#00e5ff"/><stop offset="1" stop-color="#e879f9"/></linearGradient></defs>' +
    '<polygon points="' + poly(R) + '" fill="none" stroke="rgba(120,160,255,0.18)"/>' +
    '<polygon points="' + poly(R * 0.66) + '" fill="none" stroke="rgba(120,160,255,0.10)"/>' +
    '<polygon points="' + poly(R * 0.33) + '" fill="none" stroke="rgba(120,160,255,0.10)"/>' +
    axes +
    '<polygon points="' + dataPoly + '" fill="rgba(0,229,255,0.13)" stroke="url(#rdg)" stroke-width="2" stroke-linejoin="round"/>' +
    dots + labels + '</svg>';
}

function weightEntries() {
  return Object.entries(DB)
    .filter(([,d]) => d.weight)
    .map(([dk,d]) => ({dk, wn: dateToWn(new Date(dk + 'T12:00:00')), weight: d.weight}))
    .sort((a,b) => a.dk.localeCompare(b.dk));
}

function renderProgress() {
  const entries = weightEntries();
  const latest = entries[entries.length - 1];
  const prev   = entries.length > 1 ? entries[entries.length - 2] : null;

  // Goal banner — the target everything else is derived from
  document.getElementById('goal-banner').innerHTML =
    '<div style="display:flex;align-items:center;gap:12px;position:relative;z-index:1;">' +
      '<div style="flex:1;">' +
        '<div class="disp hero-focus grad-text" style="font-size:22px;">' + GOAL.title[lang] + '</div>' +
        '<div class="hero-tag">' + GOAL.sub[lang] + '</div>' +
      '</div>' +
      '<div class="illus-side">' + illus('target') + '</div>' +
    '</div>';

  document.getElementById('prog-goal').innerHTML = settings.goalWeight + ' <span style="font-size:14px;color:var(--text2);">kg</span>';

  if (prev && latest) {
    const diff  = (latest.weight - prev.weight).toFixed(1);
    const col   = diff <= 0 ? 'var(--green)' : 'var(--red)';
    const arrow = diff <= 0 ? '▼' : '▲';
    document.getElementById('prog-diff').innerHTML = '<span style="color:' + col + ';">' + arrow + ' ' + Math.abs(diff) + ' kg</span>';
  } else {
    document.getElementById('prog-diff').textContent = '';
  }

  if (latest) {

    document.getElementById('prog-rem').textContent = rem > 0 ? rem + ' kg ' + t('to_goal') : t('goal_reached');
  } else {
    document.getElementById('prog-rem').textContent = '';
  }

  renderWeightChart(entries);
  renderWeighinTable(entries);
  renderCompChart();
}

function renderWeightChart(entries) {
  const el = document.getElementById('wchart');
  const W=320, H=120, px=26, py=16;

  // Expected trajectory: start weight at W1 start, then expected kg at each week's end
  const expPts = [{x:0, w:PROGRAM.startWeight}];
  PROGRAM.expected.forEach((w, i) => expPts.push({x:i+1, w}));
  const maxX = PROGRAM.weeks;

  const allW = expPts.map(p=>p.w).concat(entries.map(e=>e.weight), [settings.goalWeight]);
  const minV = Math.min(...allW) - 0.6;
  const maxV = Math.max(...allW) + 0.6;
  const sx = x => px + (x / maxX) * (W - px*2);
  const sy = v => H - py - ((v - minV) / (maxV - minV)) * (H - py*2);

  const expPath = expPts.map((p,i) => (i===0?'M ':'L ') + sx(p.x).toFixed(1) + ' ' + sy(p.w).toFixed(1)).join(' ');

  // Actual entries positioned by fraction of program elapsed
  const ms0 = W1_START.getTime();
  const wkMs = 604800000;
  const aPts = entries.map(e => {
    const d = new Date(e.dk + 'T12:00:00');
    const x = Math.min(Math.max((d.getTime() - ms0) / wkMs, 0), maxX);
    return {x, w: e.weight, wn: e.wn};
  });
  const aPath = aPts.map((p,i) => (i===0?'M ':'L ') + sx(p.x).toFixed(1) + ' ' + sy(p.w).toFixed(1)).join(' ');
  const dots = aPts.map(p =>
    '<circle cx="' + sx(p.x).toFixed(1) + '" cy="' + sy(p.w).toFixed(1) + '" r="4" fill="var(--accent)"/>' +
    '<text x="' + sx(p.x).toFixed(1) + '" y="' + (sy(p.w)-8).toFixed(1) + '" fill="#aeb8d8" font-size="9" text-anchor="middle">' + p.w + '</text>'
  ).join('');

  const wkLabels = Array.from({length:maxX+1},(_,i) =>
    '<text x="' + sx(i).toFixed(1) + '" y="' + (H-2) + '" fill="#465070" font-size="8.5" text-anchor="middle">' + (i===0 ? t('start') : 'W'+i) + '</text>'
  ).join('');

  el.innerHTML = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' +
    '<defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="0">' +
    '<stop offset="0" stop-color="#00e5ff"/><stop offset="1" stop-color="#e879f9"/></linearGradient></defs>' +
    '<path d="' + expPath + '" fill="none" stroke="rgba(167,139,250,0.6)" stroke-width="1.5" stroke-dasharray="5,4"/>' +
    (aPts.length ? '<path d="' + aPath + '" fill="none" stroke="url(#lg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>' : '') +
    dots + wkLabels + '</svg>' +
    (aPts.length ? '' : '<div class="chart-empty">' + illus('scale') + '<span>' + t('ins_weigh_in') + '</span></div>');
}

function renderWeighinTable(entries) {
  // latest actual weigh-in per program week
  const actualByWn = {};
  entries.forEach(e => { actualByWn[e.wn] = e.weight; });

  let rows = '<tr><th>' + t('week_w') + '</th><th>' + t('expected') + '</th><th>' + t('actual') + '</th><th>' + t('vs_expected') + '</th></tr>';
  rows += '<tr><td>' + t('start') + '</td><td class="num">' + PROGRAM.startWeight.toFixed(1) + '</td><td class="num">—</td><td>—</td></tr>';
  for (let wn = 1; wn <= PROGRAM.weeks; wn++) {
    const exp = PROGRAM.expected[wn - 1];
    const act = actualByWn[wn];
    let delta = '—', col = 'var(--text3)';
    if (act != null) {
      const d = (act - exp).toFixed(1);
      col = d <= 0 ? 'var(--green)' : 'var(--amber)';
      delta = (d > 0 ? '+' : '') + d + ' kg';
    }
    rows += '<tr><td>' + t('week_w') + ' ' + wn + '</td><td class="num">' + exp.toFixed(1) + '</td>' +
      '<td class="num" style="color:var(--text);">' + (act != null ? act.toFixed(1) : '—') + '</td>' +
      '<td class="num" style="color:' + col + ';">' + delta + '</td></tr>';
  }
  document.getElementById('weighin-table').innerHTML = rows;
}

function renderCompChart() {
  const currentWn = Math.max(todayWn(), 1);
  const lastWn = Math.max(currentWn, PROGRAM.weeks);
  let html = '<div style="display:flex;gap:7px;align-items:flex-end;height:80px;">';
  for (let wn = 1; wn <= lastWn; wn++) {
    let pass = 0, tot = 0;
    getWeekKeys(wn).forEach(dk => {
      const day = DB[dk];
      if (!day) return;
      HKEYS.filter(k => k !== 'cal').forEach(k => {
        const v = day.habits?.[k];
        if (v !== null && v !== undefined) { tot++; if (v === 1) pass++; }
      });
    });
    const pct = tot > 0 ? Math.round((pass / tot) * 100) : 0;
    const h   = Math.max(Math.round((pct / 100) * 60), 2);
    const col = pct >= 80 ? 'var(--accent)' : pct >= 60 ? 'var(--amber)' : tot > 0 ? 'var(--red)' : 'var(--bg4)';
    html += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">' +
      '<span style="font-size:10px;color:var(--text2);">' + (tot > 0 ? pct + '%' : '—') + '</span>' +
      '<div style="width:100%;height:' + h + 'px;background:' + col + ';border-radius:3px 3px 0 0;"></div>' +
      '<span style="font-size:9px;color:var(--text3);font-family:var(--fd);font-weight:700;">W' + wn + '</span></div>';
  }
  html += '</div>';
  document.getElementById('comp-chart').innerHTML = html;
}

function computeInsights() {
  const out = [];
  const wn = Math.min(todayWn(), PROGRAM.weeks);
  const dks = getWeekKeys(wn);

  // Budget insight
  const consumed = dks.map(dk => DB[dk]?.cal).filter(Boolean).reduce((a,b)=>a+b,0);
  const dayIdx = dks.indexOf(todayKey());
  const elapsed = dayIdx >= 0 ? dayIdx + 1 : 7;
  const expectedShare = PROGRAM.weekBudget * (elapsed / 7);
  if (consumed > 0) {
    const hot = consumed > expectedShare * 1.05;
    out.push({t: hot ? 'a' : 'g', icon: hot ? 'alert' : 'check',
      title: hot ? t('ins_budget_hot') : t('ins_budget_ok'),
      body: consumed.toLocaleString() + ' / ' + PROGRAM.weekBudget.toLocaleString() + ' kcal · W' + wn});
  }

  // Weight vs expected
  const entries = weightEntries();
  const latest = entries[entries.length - 1];
  if (latest) {
    const expIdx = Math.min(Math.max(latest.wn, 1), PROGRAM.weeks) - 1;
    const exp = PROGRAM.expected[expIdx];
    const d = latest.weight - exp;
    out.push({t: d <= 0.3 ? 'g' : 'a', icon: d <= 0.3 ? 'trenddown' : 'trendup',
      title: d <= 0.3 ? t('ins_weight_ahead') : t('ins_weight_behind'),
      body: latest.weight + ' kg ' + t('actual').toLowerCase() + ' · ' + exp + ' kg ' + t('expected').toLowerCase() + ' (W' + Math.min(latest.wn, PROGRAM.weeks) + ')'});
  } else {
    out.push({t:'a', icon:'scalemini', title: t('ins_weigh_in'),
      body: lang === 'en' ? 'Same day, morning, after toilet, before food.' : 'Mismo día, por la mañana, después del baño, antes de comer.'});
  }
  return out;
}

function goalContext() {
  // Derive meal semantics from the plan's context tags so Claude can
  // rebuild the plan around a new goal without losing the constraints.
  const officeDays = [], homeDays = [], permissiveDays = [];
  const dnames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for (let d = 0; d < 7; d++) {
    (DAYPLAN[d].where === 'office' ? officeDays : homeDays).push(dnames[d]);
    if (DAYPLAN[d].mode === 'permissive') permissiveDays.push(dnames[d]);
  }
  return 'GOAL (the entire plan below is derived from this):\n' +
    '- Type: fat loss. Reach ' + GOAL.deadline + ' with ~' + GOAL.fatKg[0] + '-' + GOAL.fatKg[1] +
    ' kg less body FAT (' + GOAL.scaleKg[0] + '-' + GOAL.scaleKg[1] + ' kg on the scale incl. week-1 water), muscle kept. After: ' + GOAL.after + '.\n\n' +
    'MEAL PLAN SEMANTICS (constraints behind the menu, not a rigid list):\n' +
    '- "office" items are tied to office days (' + officeDays.join('/') + '): salmon + rice is the office lunch — only fits days the user is at the office.\n' +
    '- "home" items (eggs, home salmon bowls) belong to home days (' + homeDays.join('/') + ').\n' +
    '- Chilli con carne jars are FLEXIBLE — they can slot into any day.\n' +
    '- Staples (skyr, oats, banana, shakes, apple, almonds) are timing-flexible.\n' +
    '- Weekends (' + permissiveDays.join('/') + ') are more permissive: ONE indulgent meal + drinks under a 2450 kcal daily cap, decided sober in advance.\n' +
    '- Daily kcal follows the day\'s training load; protein stays high (~' + settings.protein + ' g/day).\n\n' +
    'IMPORTANT: the current plan mirrors the user\'s spreadsheet exactly — do not propose replacing it unprompted. ' +
    'If the user asks for a DIFFERENT goal (new deadline, more/less fat loss, a maintenance phase, muscle gain), generate a new plan that honors ' +
    'these same constraints (office/home/flexible/weekend rules, training-load-matched calories, high protein) and give an expected weekly weigh-in trajectory.';
}

    box.innerHTML = '<span style="color:var(--amber);">' + t('no_key_msg') + '</span>';

  const dow = todayDow();
  const plan = DAYPLAN[dow];
  const entries = weightEntries();
  const latestW = entries[entries.length - 1];
  const dks = getWeekKeys(Math.min(wn, PROGRAM.weeks));
  const weekCals = dks.map(dk => DB[dk]?.cal).filter(Boolean);
  const consumed = weekCals.reduce((a,b)=>a+b,0);

  const system = 'You are a fitness coach AI embedded in LeanTracker, tracking a 4-week cut called "THE CUT" (7 Jun - 3 Jul 2026, then a trip to Stockholm).\n\n' +
    'PROGRAM:\n' +
    '- Start weight 87 kg. Expected weekly weigh-ins: W1 85.3, W2 84.7, W3 84.1, W4 83.5 kg. Goal: lose 3-3.8 kg on the scale (~2-2.3 kg real fat).\n' +
    '- Weekly calorie budget: 15,410 kcal. Day targets: Mon 1960 (run), Tue/Wed 2065 (lift), Thu 2345 (legs, highest), Fri 2075 (rest), Sat/Sun cap 2450 (run + one indulgent meal).\n' +
    '- Lifting: Tue chest/tri/abs, Wed back/biceps, Thu legs. Running progression (km Mon/Sat/Sun): W1 9/12/9, W2 10/13/11, W3 11/14/12, W4 11/13/11. Mostly easy zone 2.\n' +
    '- Rules: week 2 will stall, hold calories; weekends one indulgent meal with drinks decided sober; keep lifts heavy.\n\n' +
    goalContext() + '\n\n' +
    'USER STATE (today = ' + todayKey() + ', week ' + wn + ' of 4, day plan: ' + plan.focus.en + '):\n' +
    '- Current weight: ' + (latestW ? latestW.weight + ' kg (logged ' + latestW.dk + ')' : 'not yet logged') + '. Goal: ' + settings.goalWeight + ' kg.\n' +
    '- This week so far: ' + (weekCals.length ? consumed + ' kcal logged over ' + weekCals.length + ' day(s)' : 'no calories logged') + '. Protein target: ' + settings.protein + ' g/day.\n\n' +
    'Respond in ' + (lang === 'en' ? 'English' : 'Spanish') + '. Be specific, practical, and concise (under 280 words). Use **bold** for key numbers or actions.';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-8',
        max_tokens: 1024,
        system,
        messages: [{ role: 'user', content: q }]
      })
    });
    const data = await res.json();

    if (!res.ok) {
      const msg = data.error?.message || ('HTTP ' + res.status);
      const hint = res.status === 401
        ? (lang === 'en' ? ' — check your API key in Settings.' : ' — revisa tu clave API en Ajustes.')
        : '';
      box.innerHTML = '<span style="color:var(--red);">' + msg + hint + '</span>';
      return;
    }

    const text = (data.content || []).map(c => c.text || '').join('') || 'No response.';
    box.innerHTML = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>')
      .replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--accent)">$1</strong>');
  } catch (e) {
    box.innerHTML = '<span style="color:var(--red);">' + (lang === 'en' ? 'Connection error. Check your internet.' : 'Error de conexión. Revisa tu internet.') + '</span>';
  }
}

// ─────────────────────────────────────────────────────────────────
// SETTINGS
// ─────────────────────────────────────────────────────────────────
function renderSettingsForm() {
  document.getElementById('s-calmin').value = settings.calMin;
  document.getElementById('s-calmax').value = settings.calMax;
  document.getElementById('s-prot').value   = settings.protein;
  document.getElementById('s-goal').value   = settings.goalWeight;
  document.getElementById('s-apikey').value = apiKey;
}

function saveSettings() {
  settings.calMin     = parseInt(document.getElementById('s-calmin').value)   || 1960;
  settings.calMax     = parseInt(document.getElementById('s-calmax').value)   || 2450;
  settings.protein    = parseInt(document.getElementById('s-prot').value)     || 160;
  settings.goalWeight = parseFloat(document.getElementById('s-goal').value)   || 83.5;
  localStorage.setItem('lt_settings', JSON.stringify(settings));
  alert(lang === 'en' ? '✓ Settings saved' : '✓ Ajustes guardados');
}

function saveApiKey() {
  apiKey = document.getElementById('s-apikey').value.trim();
  localStorage.setItem('lt_apikey', apiKey);
  alert(lang === 'en' ? (apiKey ? '✓ API key saved' : 'API key cleared') : (apiKey ? '✓ Clave guardada' : 'Clave eliminada'));
}

// ─────────────────────────────────────────────────────────────────
// EXPORT / IMPORT
// ─────────────────────────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify({version:3, exportedAt:new Date().toISOString(), settings, db:DB}, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'leantracker-' + dkey(new Date()) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.db)       { DB = data.db; persist(); }
      if (data.settings) { settings = data.settings; localStorage.setItem('lt_settings', JSON.stringify(settings)); }
      alert(lang === 'en' ? '✓ Data imported' : '✓ Datos importados');
      renderActive();
    } catch { alert(lang === 'en' ? 'Invalid file.' : 'Archivo inválido.'); }
  };
  reader.readAsText(file);
  input.value = '';
}

setTimeout(() => {
  const b = document.getElementById('boot');
  if (b) { b.classList.add('done'); setTimeout(() => b.remove(), 500); }
}, 950);
