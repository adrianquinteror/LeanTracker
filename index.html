// ASK CLAUDE
// Calls the Anthropic Messages API directly from the browser.
// Requires an API key (Settings → Claude access) plus the
// anthropic-dangerous-direct-browser-access header for CORS.
// ─────────────────────────────────────────────────────────────────
// Serialize the ACTIVE plan for Claude — works for any imported or
// generated plan, not just the original cut
function planContextForClaude() {
  if (!hasPlan()) return 'NO ACTIVE PLAN — observation/baseline mode.';
  const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dayLines = dn.map((n, d) => {
    const dp = DAYPLAN[d];
    return n + ': ' + dp.focus.en + ' · ' + (dp.isCap ? 'cap ' : 'target ') + dp.cal + ' kcal' +
      (dp.workout ? ' · lifts: ' + dp.workout.map(w => w[0]).join(', ') : '');
  }).join('\n  ');
  const runLines = PROGRAM.runs.map((wk, i) => 'W' + (i + 1) + ': ' +
    Object.keys(wk).map(d => dn[d] + ' ' + wk[d] + 'km').join(', ')).join(' · ');
  return 'ACTIVE PROGRAM "' + PROGRAM.name + '" (' + dkey(w1Start()) + ' to ' + dkey(progEnd()) + ', ' + PROGRAM.weeks + ' weeks):\n' +
    '- Start weight ' + PROGRAM.startWeight + ' kg. Expected weigh-ins: ' + PROGRAM.expected.map((w, i) => 'W' + (i + 1) + ' ' + w).join(', ') + ' kg.\n' +
    '- Weekly calorie budget: ' + PROGRAM.weekBudget.toLocaleString('en-US') + ' kcal. Day plans:\n  ' + dayLines + '\n' +
    '- Running: ' + (runLines || 'none') + '.' +
    (PLAN.rules && PLAN.rules.en && PLAN.rules.en.length ? '\n- Rules: ' + PLAN.rules.en.join(' | ') : '');
}

function goalContext() {
  if (!hasPlan()) {
    const tracked = Object.keys(DB).filter(isActiveDay).length;
    return 'NO PLAN YET — the user is tracking a baseline (' + tracked + ' active days logged) before adopting a plan. ' +
      'Meal-context concepts the app uses: office-tied items, home items, flexible items that fit any day, timing-flexible staples, ' +
      'and permissive weekend days with one indulgent meal under a calorie cap. ' +
      'If asked for a plan, recommend generating or importing one in the app (Settings → Plan) and base advice on the tracked data.';
  }
  // Derive meal semantics from the plan's context tags so Claude can
  // rebuild the plan around a new goal without losing the constraints.
  const officeDays = [], homeDays = [], permissiveDays = [];
  const dnames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for (let d = 0; d < 7; d++) {
    (DAYPLAN[d].where === 'office' ? officeDays : homeDays).push(dnames[d]);
    if (DAYPLAN[d].mode === 'permissive') permissiveDays.push(dnames[d]);
  }
  const goalLine = GOAL.fatKg
    ? '- Type: ' + GOAL.type + '. Reach ' + dkey(progEnd()) + ' with ~' + GOAL.fatKg[0] + '-' + GOAL.fatKg[1] +
      ' kg less body FAT (' + GOAL.scaleKg[0] + '-' + GOAL.scaleKg[1] + ' kg on the scale incl. week-1 water), muscle kept. After: ' + (GOAL.after || '—') + '.'
    : '- ' + ((GOAL.desc && GOAL.desc.en) || GOAL.type) + ' Deadline: ' + dkey(progEnd()) + '.';
  return 'GOAL (the entire plan below is derived from this):\n' + goalLine + '\n\n' +
    'MEAL PLAN SEMANTICS (constraints behind the menu, not a rigid list):\n' +
    '- "office"-tagged items only fit office days (' + officeDays.join('/') + ').\n' +
    '- "home"-tagged items belong to home days (' + homeDays.join('/') + ').\n' +
    '- "flex"-tagged items can slot into ANY day.\n' +
    '- "any"-tagged staples are timing-flexible.\n' +
    '- Permissive days (' + (permissiveDays.join('/') || 'none') + ') allow ONE indulgent meal + drinks under that day\'s kcal cap, decided in advance.\n' +
    '- Daily kcal follows the day\'s training load; protein stays high' + (settings.protein ? ' (~' + settings.protein + ' g/day)' : '') + '.\n\n' +
    'IMPORTANT: the current plan mirrors the user\'s spreadsheet exactly — do not propose replacing it unprompted. ' +
    'If the user asks for a DIFFERENT goal (new deadline, more/less fat loss, a maintenance phase, muscle gain), generate a new plan that honors ' +
    'these same constraints (office/home/flexible/weekend rules, training-load-matched calories, high protein) and give an expected weekly weigh-in trajectory.';
}

async function askClaude() {
  const q = document.getElementById('custom-q').value.trim();
  if (!q) return;

  const box = document.getElementById('ai-box');
  box.className = 'ai-box on';

  if (!apiKey) {
    box.innerHTML = '<span style="color:var(--amber);">' + t('no_key_msg') + '</span>';
    return;
  }

  box.innerHTML = '<span class="loader"></span><span style="color:var(--accent);font-size:12px;">' + (lang === 'en' ? 'Thinking…' : 'Pensando…') + '</span>';

  const wn = todayWn();
  const dow = todayDow();
  const plan = DAYPLAN ? DAYPLAN[dow] : null;
  const entries = weightEntries();
  const latestW = entries[entries.length - 1];
  const dks = getWeekKeys(hasPlan() ? Math.min(Math.max(wn, 1), PROGRAM.weeks) : Math.max(wn, 1));
  const weekCals = dks.map(dk => DB[dk]?.cal).filter(Boolean);
  const consumed = weekCals.reduce((a,b)=>a+b,0);

  const system = 'You are a fitness coach AI embedded in LeanTracker, a personal tracking app.\n\n' +
    planContextForClaude() + '\n\n' +
    goalContext() + '\n\n' +
    'USER STATE (today = ' + todayKey() + (hasPlan() ? ', week ' + wn + ' of ' + PROGRAM.weeks + ', day plan: ' + (plan ? plan.focus.en : '—') : ', baseline mode') + '):\n' +
    '- Current weight: ' + (latestW ? latestW.weight + ' kg (logged ' + latestW.dk + ')' : 'not yet logged') + '. Goal: ' + settings.goalWeight + ' kg.\n' +
    '- This week so far: ' + (weekCals.length ? consumed + ' kcal logged over ' + weekCals.length + ' day(s)' : 'no calories logged') + '. Protein target: ' + settings.protein + ' g/day.\n\n' +
    'Respond in ' + (lang === 'en' ? 'English' : 'Spanish') + '. Be specific, practical, and concise (under 280 words). Use **bold** for key numbers or actions.';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-8',
        max_tokens: 1024,
        system,
        messages: [{ role: 'user', content: q }]
      })
    });
    const data = await res.json();

    if (!res.ok) {
      const msg = data.error?.message || ('HTTP ' + res.status);
      const hint = res.status === 401
        ? (lang === 'en' ? ' — check your API key in Settings.' : ' — revisa tu clave API en Ajustes.')
        : '';
      box.innerHTML = '<span style="color:var(--red);">' + msg + hint + '</span>';
      return;
    }

    const text = (data.content || []).map(c => c.text || '').join('') || 'No response.';
    box.innerHTML = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>')
      .replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--accent)">$1</strong>');
  } catch (e) {
    box.innerHTML = '<span style="color:var(--red);">' + (lang === 'en' ? 'Connection error. Check your internet.' : 'Error de conexión. Revisa tu internet.') + '</span>';
  }
}

// ─────────────────────────────────────────────────────────────────
// PLAN MANAGEMENT — import / export / reset / generate
// ─────────────────────────────────────────────────────────────────
function validatePlan(pl) {
  if (!pl || typeof pl !== 'object') return ['not a plan object'];
  const errs = [];
  if (!/^\d{4}-\d{2}-\d{2}$/.test(pl.startDate || '')) errs.push('startDate must be YYYY-MM-DD');
  if (!(pl.weeks >= 1 && pl.weeks <= 12)) errs.push('weeks must be 1-12');
  if (typeof pl.weekBudget !== 'number') errs.push('weekBudget (kcal) missing');
  if (!Array.isArray(pl.expected) || pl.expected.length !== pl.weeks) errs.push('expected[] needs one weight per week');
  if (!Array.isArray(pl.runs) || pl.runs.length !== pl.weeks) errs.push('runs[] needs one entry per week');
  for (let d = 0; d < 7; d++) {
    const day = pl.days && pl.days[d];
    if (!day) { errs.push('missing day ' + d); continue; }
    if (typeof day.cal !== 'number') errs.push('day ' + d + ': cal missing');
    if (!day.focus || !day.focus.en) errs.push('day ' + d + ': focus.en missing');
    if (!Array.isArray(day.meals) || !day.meals.length) errs.push('day ' + d + ': meals missing');
    else day.meals.forEach((m, i) => {
      if (typeof m.n !== 'string' || (m.k !== null && typeof m.k !== 'number')) errs.push('day ' + d + ' meal ' + (i + 1) + ' invalid');
    });
  }
  return errs;
}

function normalizePlan(pl) {
  pl.schema = 1;
  // generated plans deliver runs as [[{dow,km}]...] — convert to {dow:km}
  if (Array.isArray(pl.runs) && Array.isArray(pl.runs[0])) {
    pl.runs = pl.runs.map(wk => { const o = {}; wk.forEach(r => { if (r.km > 0) o[r.dow] = r.km; }); return o; });
  }
  for (let d = 0; d < 7; d++) {
    const day = pl.days && pl.days[d];
    if (!day) continue;
    if (day.workout === null || (Array.isArray(day.workout) && !day.workout.length)) delete day.workout;
    if (!day.illus) day.illus = day.workout ? 'lift' : 'rest';
    if (!day.tag) day.tag = {en: '', es: ''};
    if (day.focus && !day.focus.es) day.focus.es = day.focus.en;
    if (day.isCap === undefined) day.isCap = day.mode === 'permissive';
    (day.meals || []).forEach(m => { if (m.c === 'indulgent' && !m.k) m.k = null; });
  }
  if (!pl.progDays) pl.progDays = pl.weeks * 7 - 1;
  if (!pl.rules) pl.rules = {en: [], es: []};
  if (!pl.goal) pl.goal = {type: 'custom', after: '', title: {en: pl.name || 'PLAN', es: pl.name || 'PLAN'},
                           sub: {en: '', es: ''}, desc: {en: '', es: ''}};
  return pl;
}

function planSummaryHTML(pl) {
  const dn = L[lang].dshort;
  const end = new Date(pl.startDate + 'T12:00:00');
  end.setDate(end.getDate() + (pl.progDays || pl.weeks * 7 - 1) - 1);
  const dayKcals = Array.from({length: 7}, (_, d) => dn[d] + ' ' + pl.days[d].cal).join(' · ');
  const runTotals = pl.runs.map((wk, i) => 'W' + (i + 1) + ': ' +
    Object.values(wk).reduce((a, b) => a + b, 0) + 'km').join(' · ');
  return '<strong style="color:var(--text);">' + (pl.name || 'PLAN') + '</strong><br>' +
    fmtDate(new Date(pl.startDate + 'T12:00:00')) + ' → ' + fmtDate(end) + ' · ' + pl.weeks + ' ' + t('weeks_w') + '<br>' +
    (pl.goal && pl.goal.title ? '<span class="grad-text" style="font-family:var(--fd);font-weight:700;">' +
      (pl.goal.title[lang] || pl.goal.title.en) + '</span><br>' : '') +
    t('week_budget') + ': ' + pl.weekBudget.toLocaleString() + ' kcal<br>' +
    'kcal: ' + dayKcals + '<br>' +
    t('run_plan') + ': ' + (runTotals || '—');
}

function importPlanFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const pl = normalizePlan(JSON.parse(e.target.result));
      const errs = validatePlan(pl);
      if (errs.length) { alert(t('invalid_plan') + '\n' + errs.join('\n')); return; }
      previewPlan(pl);
    } catch { alert(t('invalid_plan')); }
  };
  reader.readAsText(file);
  input.value = '';
}

function exportPlan() {
  if (!PLAN) { alert(t('plan_none')); return; }
  const blob = new Blob([JSON.stringify(PLAN, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'leantracker-plan-' + dkey(new Date()) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function resetPlan() {
  if (!PLAN) return;
  if (!confirm(t('reset_q'))) return;
  localStorage.removeItem('lt_plan');
  PLAN = null;
  applyPlan();
  renderActive();
  renderSettingsForm();
  toast(t('plan_removed'));
}

// ── Generate with Claude — questionnaire + tracked-data digest →
//    structured-output plan JSON → validate → preview
const _LSCH = {type:'object', properties:{en:{type:'string'}, es:{type:'string'}}, required:['en','es'], additionalProperties:false};
const _MEALSCH = {type:'object', properties:{n:{type:'string'}, k:{type:'integer'},
  c:{type:'string', enum:['any','office','home','flex','indulgent']}}, required:['n','k','c'], additionalProperties:false};
const _DAYSCH = {type:'object', properties:{
  illus:{type:'string', enum:['run','runfree','lift','rest']},
  where:{type:'string', enum:['office','home']},
  mode:{type:'string', enum:['strict','permissive']},
  focus:_LSCH, tag:_LSCH, cal:{type:'integer'}, isCap:{type:'boolean'},
  meals:{type:'array', items:_MEALSCH},
  workout:{anyOf:[{type:'array', items:{type:'array', items:{type:'string'}}}, {type:'null'}]}},
  required:['illus','where','mode','focus','tag','cal','isCap','meals','workout'], additionalProperties:false};
const PLAN_SCHEMA = {type:'object', properties:{
  schema:{type:'integer'}, name:{type:'string'}, startDate:{type:'string'},
  weeks:{type:'integer'}, progDays:{type:'integer'}, weekBudget:{type:'integer'},
  startWeight:{type:'number'}, goalWeight:{type:'number'}, protein:{type:'integer'},
  expected:{type:'array', items:{type:'number'}},
  runs:{type:'array', items:{type:'array', items:{type:'object',
    properties:{dow:{type:'integer'}, km:{type:'number'}}, required:['dow','km'], additionalProperties:false}}},
  goal:{type:'object', properties:{type:{type:'string'}, after:{type:'string'}, title:_LSCH, sub:_LSCH, desc:_LSCH},
    required:['type','after','title','sub','desc'], additionalProperties:false},
  rules:{type:'object', properties:{en:{type:'array', items:{type:'string'}}, es:{type:'array', items:{type:'string'}}},
    required:['en','es'], additionalProperties:false},
  days:{type:'object', properties:{'0':_DAYSCH,'1':_DAYSCH,'2':_DAYSCH,'3':_DAYSCH,'4':_DAYSCH,'5':_DAYSCH,'6':_DAYSCH},
    required:['0','1','2','3','4','5','6'], additionalProperties:false}},
  required:['schema','name','startDate','weeks','progDays','weekBudget','startWeight','goalWeight',
            'protein','expected','runs','goal','rules','days'], additionalProperties:false};

function trackingDigest() {
  const days = Object.keys(DB).filter(isActiveDay).sort();
  if (!days.length) return 'No tracked data yet.';
  const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const byDow = [[],[],[],[],[],[],[]];
  days.forEach(dk => { const c = DB[dk].cal; if (c) byDow[dowOf(dk)].push(c); });
  const avg = byDow.map((a, i) => a.length ? dn[i] + ' ' + Math.round(a.reduce((x, y) => x + y, 0) / a.length) : null)
    .filter(Boolean).join(', ');
  const comp = HKEYS.filter(k => k !== 'cal').map(k => {
    let pts = 0, tot = 0;
    days.forEach(dk => { const v = DB[dk].habits?.[k]; if (v !== null && v !== undefined) { tot++; pts += v; } });
    return tot ? k + ' ' + Math.round((pts / tot) * 100) + '%' : null;
  }).filter(Boolean).join(', ');
  const ws = weightEntries().map(e => e.dk + ' ' + e.weight + 'kg').join(', ');
  const notes = days.map(dk => DB[dk].training).filter(Boolean).slice(-8).join(' | ');
  return days.length + ' days tracked (' + days[0] + ' to ' + days[days.length - 1] + ').\n' +
    'Avg logged kcal by weekday: ' + (avg || 'none') + '.\n' +
    'Habit compliance: ' + (comp || 'none') + '.\n' +
    'Weigh-ins: ' + (ws || 'none') + '.\n' +
    'Recent training notes: ' + (notes || 'none') + '.';
}

function openGenModal() {
  const ds = L[lang].dshort;
  document.getElementById('g-office').innerHTML = ds.map((d, i) =>
    '<div class="dchip' + ([2, 3, 4].includes(i) ? ' sel' : '') + '" data-d="' + i + '" ' +
    'onclick="this.classList.toggle(\'sel\')"><span class="d1">' + d.toUpperCase() + '</span></div>').join('');
  const dl = new Date(); dl.setDate(dl.getDate() + 28);
  document.getElementById('g-deadline').value = dkey(dl);
  document.getElementById('gen-box').className = 'ai-box';
  applyI18n();
  openModal('gen-modal');
}

async function genPlan() {
  const box = document.getElementById('gen-box');
  box.className = 'ai-box on';
  if (!apiKey) { box.innerHTML = '<span style="color:var(--amber);">' + t('no_key_msg') + '</span>'; return; }
  box.innerHTML = '<span class="loader"></span><span style="color:var(--accent);font-size:12px;">' + t('gen_wait') + '</span>';

  const office = [...document.querySelectorAll('#g-office .dchip.sel')].map(e => +e.getAttribute('data-d'));
  const we = weightEntries();
  const ans = {
    goal: document.getElementById('g-goal').value,
    targetKg: parseFloat(document.getElementById('g-target').value) || null,
    deadline: document.getElementById('g-deadline').value || null,
    officeDays: office,
    trainingDaysPerWeek: parseInt(document.getElementById('g-train').value) || 3,
    trainingStyle: document.getElementById('g-style').value,
    notes: document.getElementById('g-notes').value.trim(),
  };
  const tracked = Object.keys(DB).filter(isActiveDay).length;

  const sys = 'You design structured fitness plans for LeanTracker. Output ONLY the plan JSON per the schema.\n' +
    'Semantics: meal context tags — "office" items only fit office days; "home" items fit home days; "flex" fits any day; ' +
    '"any" = timing-flexible staple; "indulgent" = one free meal on permissive (weekend-style) days under that day\'s cal cap (set its k to 0). ' +
    'Day kcal follows training load; protein stays high. runs: per program week, an array of {dow,km} (dow 0=Sun..6=Sat); use [] for weeks without runs.\n' +
    'startDate: the next Sunday on or after today (' + todayKey() + '). weeks: from startDate to the deadline (1-12). ' +
    'expected: a realistic weekly weigh-in trajectory starting from ' + (we.length ? we[we.length - 1].weight + ' kg' : 'an estimated start weight') + '. ' +
    'Fill both en and es for every text. Keep meal items simple and repeatable.' +
    (tracked < 14 ? '\nLIMITED CONTEXT: only ' + tracked + ' tracked day(s) — lean on the questionnaire and say so in goal.desc.' : '');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-8',
        max_tokens: 8192,
        system: sys,
        messages: [{role: 'user', content: 'Questionnaire answers: ' + JSON.stringify(ans) +
          '\n\nTracked data:\n' + trackingDigest() + '\n\nDesign the full plan.'}],
        output_config: {format: {type: 'json_schema', schema: PLAN_SCHEMA}}
      })
    });
    const data = await res.json();
    if (!res.ok) {
      box.innerHTML = '<span style="color:var(--red);">' + (data.error?.message || ('HTTP ' + res.status)) + '</span>';
      return;
    }
    const text = (data.content || []).filter(c => c.type === 'text').map(c => c.text).join('');
    const pl = normalizePlan(JSON.parse(text));
    const errs = validatePlan(pl);
    if (errs.length) {
      box.innerHTML = '<span style="color:var(--red);">' + t('invalid_plan') + ' ' + errs.join('; ') + '</span>';
      return;
    }
    box.className = 'ai-box';
    closeModal('gen-modal');
    previewPlan(pl);
  } catch (e) {
    box.innerHTML = '<span style="color:var(--red);">' + (lang === 'en' ? 'Connection error. Check your internet.' : 'Error de conexión. Revisa tu internet.') + '</span>';
  }
}

// ─────────────────────────────────────────────────────────────────
// SETTINGS
// ─────────────────────────────────────────────────────────────────
function renderSettingsForm() {
  document.getElementById('s-calmin').value = settings.calMin;
  document.getElementById('s-calmax').value = settings.calMax;
  document.getElementById('s-prot').value   = settings.protein;
  document.getElementById('s-goal').value   = settings.goalWeight ?? '';
  document.getElementById('s-start').value  = (PLAN && PLAN.startDate) || settings.startDate || '';
  document.getElementById('s-apikey').value = apiKey;
  document.getElementById('plan-status').innerHTML = PLAN
    ? t('plan_active') + ': <strong style="color:var(--accent);">' + (PLAN.name || 'PLAN') + '</strong> · ' +
      fmtDate(new Date(PLAN.startDate + 'T12:00:00')) + ' · ' + PLAN.weeks + ' ' + t('weeks_w')
    : t('plan_none');
}

function saveSettings() {
  settings.calMin     = parseInt(document.getElementById('s-calmin').value)   || 1800;
  settings.calMax     = parseInt(document.getElementById('s-calmax').value)   || 2200;
  settings.protein    = parseInt(document.getElementById('s-prot').value)     || 120;
  settings.goalWeight = parseFloat(document.getElementById('s-goal').value)   || null;
  settings.startDate  = document.getElementById('s-start').value || settings.startDate || null;
  if (PLAN && settings.startDate) {
    PLAN.startDate = settings.startDate;
    localStorage.setItem('lt_plan', JSON.stringify(PLAN));
  }
  localStorage.setItem('lt_settings', JSON.stringify(settings));
  viewWn = Math.max(todayWn(), 1);
  alert(lang === 'en' ? '✓ Settings saved' : '✓ Ajustes guardados');
}

function saveApiKey() {
  apiKey = document.getElementById('s-apikey').value.trim();
  localStorage.setItem('lt_apikey', apiKey);
  alert(lang === 'en' ? (apiKey ? '✓ API key saved' : 'API key cleared') : (apiKey ? '✓ Clave guardada' : 'Clave eliminada'));
}

// ─────────────────────────────────────────────────────────────────
// EXPORT / IMPORT
// ─────────────────────────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify({version:4, exportedAt:new Date().toISOString(), settings, plan:PLAN, db:DB}, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'leantracker-' + dkey(new Date()) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.db)       { DB = data.db; persist(); }
      if (data.settings) { settings = data.settings; localStorage.setItem('lt_settings', JSON.stringify(settings)); }
      if (data.plan)     { savePlan(normalizePlan(data.plan)); }
      alert(lang === 'en' ? '✓ Data imported' : '✓ Datos importados');
      renderActive();
    } catch { alert(lang === 'en' ? 'Invalid file.' : 'Archivo inválido.'); }
  };
  reader.readAsText(file);
  input.value = '';
}

// ─────────────────────────────────────────────────────────────────
loadPlan();               // hydrate the stored plan (auto-migrates existing installs)
seedHistory();            // no-op if DB already exists in localStorage
viewWn = Math.max(todayWn(), 1);  // week view starts on current program week
applyI18n();
renderToday();

// ── Day-rollover / resume handling: a PWA restored from memory keeps
// running with the old date — re-anchor "today" whenever we wake up.
let lastSeenDay = todayKey();
function handleResume() {
  const tk = todayKey();
  if (tk !== lastSeenDay) {
    if (selKey() === lastSeenDay) goToday();   // follow the new today
    lastSeenDay = tk;
    _tickerLast = '';
    renderActive();
  }
  updateStreak();
  if (activeScr === 'today') updateRings();
}
document.addEventListener('visibilitychange', () => { if (!document.hidden) handleResume(); });
window.addEventListener('pageshow', handleResume);
setInterval(handleResume, 60000);
document.getElementById('version-tag').textContent = 'LEANTRACKER ' + APP_VERSION;
document.getElementById('cal-btn').innerHTML = cicon('calendar', 13);

// dismiss the boot sequence once the first paint is in
setTimeout(() => {
  const b = document.getElementById('boot');
  if (b) { b.classList.add('done'); setTimeout(() => b.remove(), 500); }
}, 950);
</script>
